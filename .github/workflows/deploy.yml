# Deploy AuditDelta to Heroku Container Registry on push to main
# Required secret: HEROKU_API_KEY (from https://dashboard.heroku.com/account)
# App name: auditdelta-guardian (create app first: heroku create auditdelta-guardian)

name: Deploy to Heroku

on:
  push:
    branches:
      - main

env:
  HEROKU_APP_NAME: auditdelta-guardian

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Heroku Container Registry
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          echo $HEROKU_API_KEY | docker login --username=_ --password-stdin registry.heroku.com

      - name: Build and push Docker image
        run: |
          docker build -t registry.heroku.com/${{ env.HEROKU_APP_NAME }}/web .
          docker push registry.heroku.com/${{ env.HEROKU_APP_NAME }}/web

      - name: Install Heroku CLI
        run: |
          curl https://cli-assets.heroku.com/install.sh | sh

      - name: Release to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          heroku container:release web --app ${{ env.HEROKU_APP_NAME }}
