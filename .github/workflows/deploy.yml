# CI: Build AuditDelta Docker image on every push to main
#
# Deployment is handled via Heroku's Native GitHub Integration (Automatic Deploys).
# Our Heroku account uses Federated (SSO) authentication, which does not support
# long-lived API keys. Heroku pulls the code directly from GitHub on each push,
# reads heroku.yml, and builds/deploys the Docker image automatically.
#
# To enable: Heroku Dashboard > auditdelta-guardian > Deploy > GitHub > Enable Automatic Deploys

name: CI Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t auditdelta-guardian:${{ github.sha }} .
